<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cumplimiento — Mayo 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f2f5;color:#1a1a2e}

.header{background:linear-gradient(135deg,#1F3864,#2E5FA3);color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.header h1{font-size:17px;font-weight:700;letter-spacing:.4px}
.header .sub{font-size:11px;opacity:.75;margin-top:3px}
.badge{background:rgba(255,255,255,.18);border-radius:20px;padding:4px 14px;font-size:11px;font-weight:600}

.kpi-strip{display:flex;gap:12px;padding:16px 24px 0;flex-wrap:wrap}
.kpi{background:#fff;border-radius:10px;padding:12px 16px;flex:1;min-width:150px;box-shadow:0 1px 4px rgba(0,0,0,.08);border-top:4px solid #ccc}
.kpi.green{border-top-color:#27ae60}.kpi.amber{border-top-color:#e67e22}.kpi.red{border-top-color:#c0392b}.kpi.blue{border-top-color:#2E5FA3}
.kpi .lbl{font-size:10px;color:#888;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.kpi .num{font-size:24px;font-weight:800;margin:4px 0 2px;line-height:1}
.kpi .det{font-size:11px;color:#aaa}

/* ── KPI FINANCIERO (dark, igual al dashboard de vendedores) ── */
.kpi-fin-section{background:#161b22;padding:16px 24px 20px;border-bottom:1px solid #30363d}
.kpi-fin-title{font-size:10px;color:#8b949e;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.kpi-fin-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
.kpi-fin-card{background:#1c2128;border:1px solid #30363d;border-radius:10px;padding:14px;position:relative;overflow:hidden;transition:border-color .2s}
.kpi-fin-card:hover{border-color:#00b4d8}
.kpi-fin-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--fin-color,#00b4d8)}
.kpi-fin-lbl{font-size:10px;color:#8b949e;text-transform:uppercase;letter-spacing:.8px;font-weight:600}
.kpi-fin-val{font-size:22px;font-weight:800;color:#e6edf3;margin:5px 0 3px;line-height:1}
.kpi-fin-sub{font-size:10px;color:#8b949e}

.filter-area{padding:14px 24px 0;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.filter-label{font-size:12px;font-weight:700;color:#555}
.sec-btn{padding:6px 14px;border-radius:20px;border:2px solid #2E5FA3;background:#fff;color:#2E5FA3;font-size:12px;font-weight:700;cursor:pointer;transition:.15s}
.sec-btn.active{background:#2E5FA3;color:#fff}
.sort-sel{padding:6px 10px;border:1.5px solid #d0d8e8;border-radius:6px;font-size:12px;cursor:pointer;background:#fff;margin-left:auto}
.filter-btn{padding:6px 14px;border:1.5px solid #ccc;border-radius:20px;font-size:11px;cursor:pointer;background:#fff;font-weight:600;transition:.15s}
.filter-btn.active{background:#1a2a3a;color:#fff;border-color:#1a2a3a}
.filter-btn.f-red.active{background:#c0392b;border-color:#c0392b}
.filter-btn.f-amber.active{background:#e67e22;border-color:#e67e22}
.filter-btn.f-green.active{background:#27ae60;border-color:#27ae60}

.toolbar{padding:8px 24px;display:flex;gap:8px;align-items:center}
.tool-btn{padding:4px 12px;border:1px solid #ccc;border-radius:6px;font-size:11px;cursor:pointer;background:#fff;font-weight:600}
.tool-btn:hover{background:#eee}

.legend{display:flex;gap:14px;align-items:center;padding:4px 24px 10px;font-size:11px;color:#777;flex-wrap:wrap}
.leg-dot{width:11px;height:11px;border-radius:3px;display:inline-block;margin-right:4px;vertical-align:middle}
.bar-note{font-size:10px;color:#aaa;margin-left:auto}

.wrap{padding:12px 24px;display:flex;flex-direction:column;gap:8px}
.rcard{background:#fff;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.07);overflow:hidden}

.rcard-header{
  display:grid;
  grid-template-columns:190px 1fr 86px 86px 86px auto;
  gap:10px;align-items:center;
  padding:13px 16px;cursor:pointer;
  border-left:4px solid #ccc;transition:background .1s;
  user-select:none;
}
.rcard-header:hover{background:#f8f9fc}
.rcard-header.green{border-color:#27ae60}
.rcard-header.amber{border-color:#e67e22}
.rcard-header.red  {border-color:#c0392b}

.rname{font-size:12px;font-weight:700;color:#1F3864;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rsector{font-size:10px;color:#888;margin-top:2px}
.rexpand-hint{font-size:9px;color:#bbb;margin-top:3px}

.bar-track{position:relative;height:20px;background:#f0f2f5;border-radius:10px;overflow:hidden}
.bar-proj{position:absolute;top:0;left:0;height:100%;border-radius:10px;opacity:.28;transition:.4s}
.bar-actual{position:absolute;top:0;left:0;height:100%;border-radius:10px;transition:.4s;display:flex;align-items:center;padding-left:8px}
.bar-actual span{font-size:10px;font-weight:800;color:#fff;white-space:nowrap;text-shadow:0 1px 2px rgba(0,0,0,.3)}
.bar-100{position:absolute;top:0;left:100%;width:2px;height:100%;background:rgba(0,0,0,.15);transform:translateX(-50%)}
.bar-green .bar-actual{background:#27ae60}.bar-green .bar-proj{background:#27ae60}
.bar-amber .bar-actual{background:#e67e22}.bar-amber .bar-proj{background:#e67e22}
.bar-red   .bar-actual{background:#c0392b}.bar-red   .bar-proj{background:#c0392b}

.stat-cell{text-align:right;font-size:11px}
.stat-cell .big{font-size:13px;font-weight:800}
.stat-cell .sml{font-size:10px;color:#999;margin-top:1px}
.c-green{color:#27ae60}.c-amber{color:#e67e22}.c-red{color:#c0392b}

.rcard-actions{display:flex;align-items:center;gap:6px}
.btn-ficha{
  background:#eef2f8;border:none;border-radius:6px;
  width:28px;height:28px;cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;flex-shrink:0;
}
.btn-ficha:hover{background:#d0ddf0}
.chevron{font-size:12px;color:#aaa;transition:transform .2s;margin-left:2px}
.rcard.open .chevron{transform:rotate(180deg)}
.prod-count-badge{font-size:10px;padding:2px 7px;border-radius:10px;background:#eef2f8;color:#2E5FA3;font-weight:700;white-space:nowrap}

.ptable-wrap{border-top:1px solid #eef0f4;display:none}
.rcard.open .ptable-wrap{display:block}
.ptable{width:100%;border-collapse:collapse;font-size:12px}
.ptable thead th{background:#f5f7fa;color:#666;font-size:10px;text-transform:uppercase;letter-spacing:.4px;padding:7px 12px;text-align:left;white-space:nowrap}
.ptable thead th.r{text-align:right}
.ptable tbody tr{border-top:1px solid #f0f0f0;cursor:pointer;transition:background .1s}
.ptable tbody tr:hover{background:#eef3fb}
.ptable td{padding:9px 12px;vertical-align:middle;white-space:nowrap}
.ptable td.desc{white-space:normal;max-width:280px;font-size:11px;line-height:1.4;font-weight:600;color:#1F3864}
.ptable td.r{text-align:right}
.ptable tr td:first-child{color:#888;font-size:11px}

.mini-bar-wrap{min-width:80px}
.mini-bar-track{height:7px;background:#eee;border-radius:4px;overflow:hidden;position:relative}
.mini-bar-proj{height:100%;position:absolute;top:0;left:0;opacity:.25;border-radius:4px}
.mini-bar-fill{height:100%;position:absolute;top:0;left:0;border-radius:4px}
.mini-pct{font-size:10px;margin-top:3px;font-weight:700}

.pbadge{font-size:10px;padding:2px 7px;border-radius:10px;white-space:nowrap;font-weight:600}
.pb-red  {background:#fdecea;color:#c0392b}
.pb-amber{background:#fef3e2;color:#b7660a}
.pb-green{background:#e8f8f0;color:#1a7a3c}
.pb-over {background:#eaf0fb;color:#1a5276}
.cob-warn{color:#c0392b;font-weight:700}
.no-prods{padding:14px 20px;font-size:11px;color:#aaa;font-style:italic}
.yoy-pos{color:#27ae60;font-weight:700;font-size:10px}
.yoy-neg{color:#c0392b;font-weight:700;font-size:10px}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal-box{background:#f0f2f5;border-radius:14px;width:100%;max-width:820px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.4);animation:popIn .18s ease}
@keyframes popIn{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}
.m-header{background:linear-gradient(135deg,#1F3864,#2E5FA3);color:#fff;padding:18px 22px;border-radius:14px 14px 0 0;display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.m-title{font-size:17px;font-weight:800;line-height:1.2}
.m-sub{font-size:11px;opacity:.75;margin-top:4px}
.m-badges{display:flex;gap:8px;align-items:center;flex-shrink:0;flex-wrap:wrap}
.m-status{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.m-status.green{background:#27ae60;color:#fff}.m-status.amber{background:#e67e22;color:#fff}.m-status.red{background:#c0392b;color:#fff}
.m-status-outline{background:transparent!important;border:2px solid currentColor}
.m-status-outline.green{color:#27ae60}.m-status-outline.amber{color:#e67e22}.m-status-outline.red{color:#c0392b}
.m-close{background:rgba(255,255,255,.2);border:none;color:#fff;width:28px;height:28px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.m-close:hover{background:rgba(255,255,255,.35)}

/* ── TABS ── */
.m-tabs{display:flex;background:#e8edf4;border-bottom:1px solid #d5dce8}
.m-tab{padding:11px 22px;font-size:12px;font-weight:700;cursor:pointer;border:none;background:none;color:#666;letter-spacing:.4px;transition:.15s;border-bottom:3px solid transparent;margin-bottom:-1px}
.m-tab:hover{color:#1F3864;background:#dde5f0}
.m-tab.active{color:#1F3864;border-bottom-color:#2E5FA3;background:#fff}

.m-body{padding:18px 20px;display:flex;flex-direction:column;gap:14px}
.m-section{background:#fff;border-radius:10px;padding:16px 18px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.m-section-title{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.7px;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid #eee}
.m-trio{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px}
.m-metric{text-align:center;padding:10px 6px;background:#f8f9fc;border-radius:8px}
.m-metric .m-val{font-size:22px;font-weight:800;line-height:1}
.m-metric .m-lbl{font-size:9px;color:#999;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
.m-bar-wrap{margin-bottom:6px}
.m-bar-label{display:flex;justify-content:space-between;font-size:10px;color:#888;margin-bottom:4px;font-weight:600}
.m-bar-track{height:28px;background:#f0f2f5;border-radius:14px;overflow:hidden;position:relative}
.m-bar-fill{height:100%;border-radius:14px;display:flex;align-items:center;padding-left:12px;transition:.5s}
.m-bar-fill span{font-size:11px;font-weight:800;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.3)}
.m-bar-proj-fill{position:absolute;top:0;left:0;height:100%;border-radius:14px;opacity:.25}
.m-bar-marker{position:absolute;top:0;height:100%;width:2px;background:rgba(0,0,0,.2)}
.m-bar-note{font-size:9px;color:#bbb;margin-top:3px;text-align:right}
.m-dist-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.m-dist-name{font-size:11px;font-weight:700;color:#1F3864;width:90px;flex-shrink:0}
.m-dist-bar{flex:1;height:20px;background:#f0f2f5;border-radius:10px;overflow:hidden}
.m-dist-fill{height:100%;border-radius:10px;background:#2E5FA3;display:flex;align-items:center;padding-left:8px}
.m-dist-fill span{font-size:9px;font-weight:700;color:#fff}
.m-dist-stat{font-size:11px;color:#555;width:100px;text-align:right;flex-shrink:0}

/* ── COMPARATIVA ── */
.comp-wrap{display:grid;grid-template-columns:1fr 1fr;gap:0;min-height:120px}
.comp-col{display:flex;flex-direction:column}
.comp-col-header{padding:10px 14px;font-size:11px;font-weight:800;letter-spacing:.3px;display:flex;align-items:center;gap:6px}
.comp-col-header.grew{background:#e8f8f0;color:#1a7a3c;border-bottom:2px solid #27ae60}
.comp-col-header.fell{background:#fdecea;color:#9b2226;border-bottom:2px solid #c0392b;border-left:1px solid #e8edf4}
.comp-col-divider{border-left:1px solid #e8edf4}
.comp-period-note{padding:10px 16px;font-size:11px;color:#555;background:#f8f9fc;border-bottom:1px solid #eee;font-weight:600}
.comp-rub-summary{padding:10px 16px;font-size:12px;background:#fff;border-bottom:1px solid #eee;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.comp-table{width:100%;border-collapse:collapse;font-size:11px}
.comp-table th{font-size:9px;text-transform:uppercase;color:#aaa;letter-spacing:.4px;padding:6px 10px;text-align:right;border-bottom:1px solid #f0f0f0}
.comp-table th:first-child{text-align:left}
.comp-table td{padding:7px 10px;border-top:1px solid #f7f7f7;text-align:right;white-space:nowrap}
.comp-table td:first-child{text-align:left;font-weight:600;color:#1F3864;white-space:normal;line-height:1.3;max-width:180px;font-size:10px}
.comp-table tbody tr:hover td{background:#f8f9fc}
.comp-grew{color:#27ae60;font-weight:800}
.comp-fell{color:#c0392b;font-weight:800}
.comp-empty{padding:20px;font-size:11px;color:#bbb;font-style:italic;text-align:center}
.comp-no-data{padding:30px;text-align:center;font-size:12px;color:#bbb;font-style:italic;grid-column:1/-1}

/* ── ANÁLISIS PROFESIONAL ── */
.analisis-wrap{padding:18px 20px;display:flex;flex-direction:column;gap:12px}
.an-sec{background:#fff;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.07);overflow:hidden}
.an-sec-title{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.7px;padding:10px 16px;border-bottom:1px solid #eee;background:#f8f9fc}
.an-sec-body{padding:12px 16px}
.an-p{font-size:12px;line-height:1.6;color:#333;margin-bottom:6px}
.an-p:last-child{margin-bottom:0}
.an-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #f5f5f5;font-size:12px}
.an-row:last-child{border-bottom:none}
.an-lbl{color:#666;font-size:11px}
.an-val{font-weight:700;color:#1F3864}
.an-pos{color:#27ae60!important;font-weight:700}
.an-neg{color:#c0392b!important;font-weight:700}
.an-amber{color:#e67e22!important;font-weight:700}
.an-note{font-size:10px;color:#999;font-style:italic;margin-top:8px}
.an-note-cls{color:#1a5276}
.an-badge{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
.an-badge-green{background:#e8f8f0;color:#1a7a3c}
.an-badge-amber{background:#fef3e2;color:#b7660a}
.an-badge-red{background:#fdecea;color:#9b2226}
.an-badge-grey{background:#f0f2f5;color:#888}
.an-table{width:100%;border-collapse:collapse;font-size:11px;margin-top:8px}
.an-table th{font-size:9px;text-transform:uppercase;color:#aaa;letter-spacing:.4px;padding:5px 8px;text-align:right;border-bottom:1px solid #eee}
.an-table th:first-child{text-align:left}
.an-table td{padding:6px 8px;border-top:1px solid #f7f7f7;text-align:right}
.an-td-desc{text-align:left!important;max-width:220px;font-weight:600;color:#1F3864;white-space:normal;line-height:1.3;font-size:10px}
.an-td-r{text-align:right}
.an-pareto-star{background:#fffbea}
.an-pareto-star td{background:#fffbea}
.an-ops-wrap{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.an-ops-col{display:flex;flex-direction:column;gap:6px}
.an-ops-head{padding:6px 10px;border-radius:6px;font-size:10px;font-weight:700;letter-spacing:.3px}
.an-ops-head-green{background:#e8f8f0;color:#1a7a3c}
.an-ops-head-red{background:#fdecea;color:#9b2226}
.an-alert-item{font-size:11px;color:#444;padding:5px 8px;border-radius:4px;line-height:1.4}
.an-alert-red{background:#fff8f8;border-left:3px solid #c0392b}

@media(max-width:1100px){
  .rcard-header{grid-template-columns:160px 1fr 80px 80px auto;}
  .rcard-header .stat-cell:last-of-type{display:none}
}
@media(max-width:800px){
  .rcard-header{grid-template-columns:1fr auto;gap:8px;padding:12px 14px}
  .rcard-header > :nth-child(2),.rcard-header > :nth-child(3),
  .rcard-header > :nth-child(4),.rcard-header > :nth-child(5){display:none}
  .rname{font-size:13px;white-space:normal}
  .kpi-strip,.filter-area,.wrap,.toolbar,.legend{padding-left:12px;padding-right:12px}
  .kpi{min-width:calc(50% - 6px)}
  .modal-overlay{padding:0;align-items:flex-end}
  .modal-box{border-radius:16px 16px 0 0;max-height:92vh;max-width:100%}
  .m-header{border-radius:16px 16px 0 0;padding:14px 16px}
  .m-title{font-size:14px}
  .m-body{padding:12px 14px;gap:10px}
  .comp-wrap,.an-ops-wrap{grid-template-columns:1fr}
}
.no-data{text-align:center;padding:50px;color:#bbb;font-size:14px}

/* ── MAIN TABS ── */
.main-tabs{display:flex;background:#1F3864;gap:2px;padding:0 24px}
.main-tab{padding:12px 22px;font-size:12px;font-weight:700;cursor:pointer;border:none;background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);letter-spacing:.4px;transition:.15s;border-bottom:3px solid transparent}
.main-tab:hover{background:rgba(255,255,255,.18);color:#fff}
.main-tab.active{background:#fff;color:#1F3864;border-bottom-color:#fff}
.main-panel{display:none}.main-panel.active{display:block}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>📊 Cumplimiento Comercial — Mayo 2026</h1>
    <div class="sub">día 4 de 28 · Generado 04/05/2026 08:43</div>
  </div>
  <div class="badge" id="badge-count">—</div>
</div>

<div class="main-tabs">
  <button class="main-tab active" onclick="switchMain('cumplimiento',this)">📊 CUMPLIMIENTO</button>
  <button class="main-tab"        onclick="switchMain('stock',this)">📦 STOCK Y REDISTRIBUCIÓN</button>
</div>

<div id="panel-cumplimiento" class="main-panel active">

<div class="kpi-fin-section">
  <div class="kpi-fin-title">📈 KPIs Financieros — Mayo 2026 hasta día 4</div>
  <div class="kpi-fin-grid" id="kpi-fin-grid"></div>
</div>

<div class="kpi-strip" id="kpi-strip"></div>

<div class="filter-area">
  <span class="filter-label">SECTOR:</span>
  <div id="sec-btns"></div>
  <select class="sort-sel" id="sort-sel" onchange="render()">
    <option value="proy_asc">Ordenar: Menor proyección primero</option>
    <option value="cumpl_asc">Ordenar: Menor cumplimiento primero</option>
    <option value="cumpl_desc">Ordenar: Mayor cumplimiento primero</option>
    <option value="alpha">Ordenar: Alfabético</option>
  </select>
</div>

<div class="filter-area" style="padding-top:8px">
  <span class="filter-label">FILTRAR:</span>
  <button class="filter-btn active" data-f="all"   onclick="setFilter('all',this)">Todos</button>
  <button class="filter-btn f-red"   data-f="red"   onclick="setFilter('red',this)">🔴 No cumple</button>
  <button class="filter-btn f-amber" data-f="amber" onclick="setFilter('amber',this)">⚠️ Riesgo</button>
  <button class="filter-btn f-green" data-f="green" onclick="setFilter('green',this)">✅ Cumple+</button>
</div>

<div class="legend">
  <span><span class="leg-dot" style="background:#c0392b"></span>Proyección &lt;60%</span>
  <span><span class="leg-dot" style="background:#e67e22"></span>Proyección 60–89%</span>
  <span><span class="leg-dot" style="background:#27ae60"></span>Proyección ≥90%</span>
  <span class="bar-note">Barra sólida = % actual · Translúcida = proyección al cierre · 📋 = ficha detalle</span>
</div>

<div class="toolbar">
  <button class="tool-btn" onclick="toggleAll(true)">▼ Expandir todo</button>
  <button class="tool-btn" onclick="toggleAll(false)">▶ Colapsar todo</button>
</div>

<div class="wrap" id="wrap"></div>

</div><!-- /panel-cumplimiento -->

<div id="panel-stock" class="main-panel">
<div style="padding:30px;color:#aaa;text-align:center">Sin datos de stock.</div>
</div><!-- /panel-stock -->

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="overlayClick(event)">
  <div class="modal-box">
    <div class="m-header">
      <div style="flex:1;min-width:0">
        <div class="m-title" id="m-title">—</div>
        <div class="m-sub"   id="m-sub">—</div>
      </div>
      <div class="m-badges">
        <span class="m-status m-status-outline" id="m-status-ytd">—</span>
        <span class="m-status" id="m-status">—</span>
        <button class="m-close" onclick="closeModal()">✕</button>
      </div>
    </div>
    <div class="m-tabs" id="m-tabs" style="display:none">
      <button class="m-tab active" id="tab-comp"     onclick="switchTab('comp')">📊 COMPARATIVA</button>
      <button class="m-tab"        id="tab-analisis"  onclick="switchTab('analisis')">📈 ANÁLISIS</button>
    </div>
    <div id="m-tab-comp"    style="display:none"></div>
    <div id="m-tab-analisis" style="display:none"></div>

  </div>
</div>

<script>
var DATA_RUBROS  = [];
var DATA_PROD    = [];
var SECT         = [];
var PREV_YEAR    = 2025;
var KPIS_FINANC  = {"total": 0.0, "venta": 0.0, "costo": 0.0, "margen": 0.0, "margen_pct": 0, "mup": 0, "uds": 0.0, "tickets": 0, "ticket_prom": 0, "iva": 0.0, "intereses": 0.0, "tarjeta_pct": 0};
var DIA_HOY     = 4;
var MES_ABREV   = 'May';
var _sector = '', _filter = 'all';

function cc(p){ return p==null?'bar-red':p>=90?'bar-green':p>=60?'bar-amber':'bar-red'; }
function cct(p){ return p==null?'c-red':p>=90?'c-green':p>=60?'c-amber':'c-red'; }
function bc(p){ return p==null?'#c0392b':p>=90?'#27ae60':p>=60?'#e67e22':'#c0392b'; }
function fmtPct(n){ return n==null?'—':n.toFixed(1).replace('.',',')+'%'; }
function fmtU(n){ return n==null?'—':Math.round(n).toLocaleString('es-AR'); }
function fmtM(v){
  if(v==null||isNaN(v)) return '—';
  var abs=Math.abs(v),neg=v<0,s;
  if(abs>=1e9) s=(abs/1e9).toFixed(1).replace('.',',')+'B';
  else if(abs>=1e6) s=(abs/1e6).toFixed(1).replace('.',',')+'M';
  else if(abs>=1e3) s=(abs/1e3).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,'.')+'K';
  else s=abs.toFixed(0);
  return (neg?'-':'')+'$'+s;
}
function fmtN(v){ return v==null?'—':Math.round(v).toLocaleString('es-AR'); }

function renderFinancKPIs(){
  var k = KPIS_FINANC;
  if(!k||!k.total) { document.getElementById('kpi-fin-grid').innerHTML='<div style="color:#8b949e;font-size:12px">Sin datos financieros para el período.</div>'; return; }
  var ivaPct  = k.total ? (k.iva||0)/k.total : 0;
  var cards = [
    { label:'VENTA',          value:fmtM(k.total),       sub:'con IVA e intereses',                          color:'#6a0dad' },
    { label:'COSTO',          value:fmtM(k.costo),       sub:'costo neto',                                   color:'#7209b7' },
    { label:'MARGEN BRUTO',   value:fmtM(k.margen),      sub:fmtPct((k.margen_pct||0)*100)+' s/ Venta Neta SF', color:'#3fb950' },
    { label:'MARGEN %',       value:fmtPct((k.margen_pct||0)*100), sub:'sobre Venta Neta SF (sin IVA, sin financ.)', color:'#43aa8b' },
    { label:'MUP',            value:(k.mup||0).toFixed(2), sub:'Venta SF / Costo (filas c/costo>0)',          color:'#b5e48c' },
    { label:'IVA',            value:fmtM(k.iva||0),      sub:fmtPct(ivaPct*100)+' de la Venta',              color:'#9d8df1' },
    { label:'INTERESES',      value:fmtM(k.intereses||0), sub:fmtPct((k.tarjeta_pct||0)*100)+' de la Venta · costo tarjetas', color:'#f4a261' },
    { label:'UNIDADES',       value:fmtN(k.uds),         sub:'vendidas',                                     color:'#f8961e' },
    { label:'TICKET PROM.',   value:fmtM(k.ticket_prom), sub:fmtN(k.tickets)+' transacciones',               color:'#f72585' },
  ];
  var html='';
  cards.forEach(function(c){
    html+='<div class="kpi-fin-card" style="--fin-color:'+c.color+'">';
    html+='<div class="kpi-fin-lbl">'+c.label+'</div>';
    html+='<div class="kpi-fin-val">'+c.value+'</div>';
    html+='<div class="kpi-fin-sub">'+c.sub+'</div>';
    html+='</div>';
  });
  document.getElementById('kpi-fin-grid').innerHTML=html;
}
function bClass(p){ return p==null?'red':p>=90?'green':p>=60?'amber':'red'; }
function mMetric(val,lbl,cls){
  return '<div class="m-metric"><div class="m-val '+(cls||'')+'">'+val+'</div><div class="m-lbl">'+lbl+'</div></div>';
}
function kpiCard(cls,num,lbl,det){
  return '<div class="kpi '+cls+'"><div class="lbl">'+lbl+'</div><div class="num">'+num+'</div><div class="det">'+det+'</div></div>';
}
function pbadge(p){
  if(p==null) return '<span class="pbadge">—</span>';
  if(p>=120)  return '<span class="pbadge pb-over">📈 Sobre rinde</span>';
  if(p>=90)   return '<span class="pbadge pb-green">✅ Cumple</span>';
  if(p>=60)   return '<span class="pbadge pb-amber">⚠️ Riesgo</span>';
  return '<span class="pbadge pb-red">🔴 No cumple</span>';
}
function varBadge(v){
  if(v==null) return '<span style="color:#aaa;font-size:10px">—</span>';
  var s=(v>0?'+':'')+v.toFixed(1).replace('.',',')+'%';
  return v>0?'<span class="comp-grew">'+s+'</span>':'<span class="comp-fell">'+s+'</span>';
}

(function(){
  var el=document.getElementById('sec-btns');
  var h='<button class="sec-btn active" onclick="setSector(this,\'\')">TODOS</button>';
  SECT.forEach(function(s){ h+='<button class="sec-btn" onclick="setSector(this,\''+s+'\')">'+s+'</button>'; });
  el.innerHTML=h;
})();

function setSector(btn,s){
  _sector=s;
  document.querySelectorAll('.sec-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active'); render();
}
function setFilter(f,btn){
  _filter=f;
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active'); render();
}

function render(){
  var sort=document.getElementById('sort-sel').value;
  var rows=DATA_RUBROS.filter(function(r){
    if(_sector && r.sector!==_sector) return false;
    if(_filter==='red')   return r.pct_proy!=null && r.pct_proy<60;
    if(_filter==='amber') return r.pct_proy!=null && r.pct_proy>=60 && r.pct_proy<90;
    if(_filter==='green') return r.pct_proy!=null && r.pct_proy>=90;
    return true;
  });
  if(sort==='proy_asc')   rows.sort(function(a,b){return (a.pct_proy||0)-(b.pct_proy||0);});
  if(sort==='cumpl_asc')  rows.sort(function(a,b){return (a.pct_cumpl||0)-(b.pct_cumpl||0);});
  if(sort==='cumpl_desc') rows.sort(function(a,b){return (b.pct_cumpl||0)-(a.pct_cumpl||0);});
  if(sort==='alpha')      rows.sort(function(a,b){return a.rubro.localeCompare(b.rubro);});

  var cumple=0,riesgo=0,nocumple=0;
  rows.forEach(function(r){ if(r.pct_proy>=90) cumple++; else if(r.pct_proy>=60) riesgo++; else nocumple++; });
  document.getElementById('kpi-strip').innerHTML=
    kpiCard('blue',rows.length,'CON OBJETIVO','rubros con seguimiento')+
    kpiCard('green',cumple,'✅ PROYECCIÓN OK','≥ 90% al cierre')+
    kpiCard('amber',riesgo,'⚠️ EN RIESGO','60 – 89%')+
    kpiCard('red',nocumple,'🔴 NO LLEGA','proyección < 60%');
  document.getElementById('badge-count').textContent=rows.length+' rubros';

  if(!rows.length){
    document.getElementById('wrap').innerHTML='<div class="no-data">Sin datos</div>'; return;
  }

  var prodMap={};
  DATA_PROD.forEach(function(p,i){
    var k=p.rubro.toUpperCase();
    if(!prodMap[k]) prodMap[k]=[];
    prodMap[k].push({p:p,i:i});
  });

  var html='';
  rows.forEach(function(r,rowIdx){
    var di=DATA_RUBROS.indexOf(r);
    var barCC=cc(r.pct_proy);
    var barAct=Math.min(r.pct_cumpl||0,100), barPrj=Math.min(r.pct_proy||0,100);
    var ccc=cct(r.pct_cumpl), cpC=cct(r.pct_proy), cyC=cct(r.pct_ytd);
    var prods=prodMap[r.rubro_key]||[], nProds=prods.length;

    html+='<div class="rcard" id="rc-'+rowIdx+'">';
    html+='<div class="rcard-header '+barCC+'" onclick="toggleCard(this)">';
    html+='<div><div class="rname" title="'+r.rubro+'">'+r.rubro+'</div>';
    html+='<div class="rsector">'+r.sector+'</div>';
    if(nProds>0) html+='<div class="rexpand-hint">▼ '+nProds+' producto'+(nProds>1?'s':'')+'</div>';
    html+='</div>';
    html+='<div><div class="bar-track '+barCC+'">';
    html+='<div class="bar-proj" style="width:'+barPrj+'%"></div>';
    html+='<div class="bar-actual" style="width:'+barAct+'%"><span>'+fmtPct(r.pct_cumpl)+'</span></div>';
    html+='<div class="bar-100"></div></div></div>';
    html+='<div class="stat-cell"><div class="big '+ccc+'">'+fmtU(r.venta_u)+' / '+fmtU(r.obj_mes)+'</div><div class="sml '+ccc+'">'+fmtPct(r.pct_cumpl)+'</div></div>';
    html+='<div class="stat-cell"><div class="big '+cpC+'">'+fmtPct(r.pct_proy)+'</div><div class="sml">proy. cierre</div></div>';
    html+='<div class="stat-cell"><div class="big '+cyC+'">'+fmtPct(r.pct_ytd)+'</div><div class="sml">YTD</div></div>';
    html+='<div class="rcard-actions">';
    if(nProds>0) html+='<span class="prod-count-badge">'+nProds+'p</span>';
    html+='<button class="btn-ficha" title="Ficha detalle" onclick="openRubroModal('+di+',event)">📋</button>';
    if(nProds>0) html+='<span class="chevron">▼</span>';
    html+='</div></div>';

    if(nProds>0){
      html+='<div class="ptable-wrap"><table class="ptable"><thead><tr>';
      html+='<th>Art.</th><th>Descripción</th><th class="r">Venta</th><th class="r">Obj.</th>';
      html+='<th>Cumpl.</th><th>Proyección</th><th class="r">YoY MTD</th><th class="r">Stock</th><th class="r">Cob.</th><th></th>';
      html+='</tr></thead><tbody>';
      prods.sort(function(a,b){return (a.p.pct_proy!=null?a.p.pct_proy:999)-(b.p.pct_proy!=null?b.p.pct_proy:999);});
      prods.forEach(function(item){
        var p=item.p, pi=item.i;
        var pbc=bc(p.pct_proy), pbW=Math.min(p.pct_cumpl||0,100), ppW=Math.min(p.pct_proy||0,100);
        var pcct=cct(p.pct_cumpl);
        var cob=p.cobertura!=null?p.cobertura.toFixed(1):'—';
        var cobCls=(p.cobertura!=null&&p.cobertura<1.5)?'cob-warn':'';
        if(p.cobertura!=null&&p.cobertura<1.5) cob+=' ⚠️';
        var yoyMtd=p.var_mtd_yoy!=null?varBadge(p.var_mtd_yoy):'<span style="color:#ccc">—</span>';
        html+='<tr onclick="openProdModal('+pi+',event)">';
        html+='<td>'+p.art+'</td><td class="desc">'+p.desc+'</td>';
        html+='<td class="r"><span class="'+pcct+'">'+fmtU(p.venta_u)+'</span></td>';
        html+='<td class="r">'+fmtU(p.obj_mes)+'</td>';
        html+='<td><div class="mini-bar-wrap"><div class="mini-bar-track">';
        html+='<div class="mini-bar-proj" style="width:'+ppW+'%;background:'+pbc+'"></div>';
        html+='<div class="mini-bar-fill" style="width:'+pbW+'%;background:'+pbc+'"></div>';
        html+='</div><div class="mini-pct '+pcct+'">'+fmtPct(p.pct_cumpl)+'</div></div></td>';
        html+='<td>'+pbadge(p.pct_proy)+'</td>';
        html+='<td class="r">'+yoyMtd+'</td>';
        html+='<td class="r">'+fmtU(p.stock)+'</td>';
        html+='<td class="r"><span class="'+cobCls+'">'+cob+'</span></td>';
        html+='<td style="padding:4px 6px;text-align:center"><button onclick="goToStock('+p.art+',event)" title="Ver stock por sucursal" style="border:none;background:none;cursor:pointer;font-size:13px;padding:0;opacity:.5" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=.5">&#128230;</button></td>';
        html+='</tr>';
      });
      html+='</tbody></table></div>';
    } else {
      html+='<div class="ptable-wrap"><div class="no-prods">Sin productos con objetivo individual cargado</div></div>';
    }
    html+='</div>';
  });
  document.getElementById('wrap').innerHTML=html;
}

function toggleCard(h){ var c=h.closest('.rcard'); if(c) c.classList.toggle('open'); }
function toggleAll(o){ document.querySelectorAll('.rcard').forEach(function(c){ if(o) c.classList.add('open'); else c.classList.remove('open'); }); }

// ── TABS ──────────────────────────────────────────────────────────────────────
function switchTab(tab){
  document.getElementById('m-tab-comp').style.display    = tab==='comp'    ?'block':'none';
  document.getElementById('m-tab-analisis').style.display = tab==='analisis'?'block':'none';
  document.getElementById('tab-comp').classList.toggle('active',    tab==='comp');
  document.getElementById('tab-analisis').classList.toggle('active', tab==='analisis');
}

// ── COMPARATIVA (MTD mismo mes, mismos días) ──────────────────────────────────
function buildComparativa(r){
  var rk=r.rubro_key;
  var prods_rub=DATA_PROD.filter(function(p){ return p.rubro.toUpperCase()===rk; });
  var grew=prods_rub.filter(function(p){ return p.var_mtd_yoy!=null && p.var_mtd_yoy>0; });
  var fell=prods_rub.filter(function(p){ return p.var_mtd_yoy!=null && p.var_mtd_yoy<=0; });
  var nodat=prods_rub.filter(function(p){ return p.var_mtd_yoy==null; });
  grew.sort(function(a,b){ return (b.var_mtd_yoy||0)-(a.var_mtd_yoy||0); });
  fell.sort(function(a,b){ return (a.var_mtd_yoy||0)-(b.var_mtd_yoy||0); });

  var periodo=MES_ABREV+' 1–'+DIA_HOY;
  var h='<div class="comp-period-note">📅 Comparando: <strong>'+periodo+' 2026</strong> vs <strong>'+periodo+' '+PREV_YEAR+'</strong> (mismo mes, mismos días)</div>';

  // Resumen rubro
  var mc=r.venta_mtd||0, mp=r.prev_mtd||0;
  h+='<div class="comp-rub-summary">';
  h+='<span style="font-size:11px;color:#888;font-weight:700">RUBRO TOTAL</span>';
  h+='<span style="font-weight:800;color:#1F3864">'+fmtU(mp)+' u ('+PREV_YEAR+')</span>';
  h+='<span style="color:#ccc;font-size:18px">→</span>';
  h+='<span style="font-weight:800;color:#1F3864">'+fmtU(mc)+' u (2026)</span>';
  h+='<span style="font-size:16px;font-weight:900">'+varBadge(r.var_mtd_yoy)+'</span>';
  h+='</div>';

  if(!prods_rub.length){
    return h+'<div class="comp-no-data">Sin productos con objetivo para este rubro</div>';
  }
  if(!grew.length && !fell.length){
    return h+'<div class="comp-no-data">Sin datos comparativos '+PREV_YEAR+' para este rubro en este período</div>';
  }

  function prodRows(list){
    if(!list.length) return '<tr><td colspan="4" class="comp-empty">Ninguno</td></tr>';
    return list.map(function(p){
      return '<tr><td>'+p.desc+'</td><td>'+fmtU(p.prev_mtd||0)+'</td><td>'+fmtU(p.venta_mtd||0)+'</td><td>'+varBadge(p.var_mtd_yoy)+'</td></tr>';
    }).join('');
  }

  h+='<div class="comp-wrap">';
  h+='<div class="comp-col">';
  h+='<div class="comp-col-header grew">📈 CRECIERON vs '+PREV_YEAR+' ('+grew.length+')</div>';
  if(grew.length){
    h+='<table class="comp-table"><thead><tr><th>PRODUCTO</th><th>'+PREV_YEAR+'</th><th>2026</th><th>VAR.%</th></tr></thead>';
    h+='<tbody>'+prodRows(grew)+'</tbody></table>';
  } else h+='<div class="comp-empty">Ninguno creció vs '+PREV_YEAR+'</div>';
  h+='</div>';

  h+='<div class="comp-col comp-col-divider">';
  h+='<div class="comp-col-header fell">📉 CAYERON vs '+PREV_YEAR+' ('+fell.length+')</div>';
  if(fell.length){
    h+='<table class="comp-table"><thead><tr><th>PRODUCTO</th><th>'+PREV_YEAR+'</th><th>2026</th><th>VAR.%</th></tr></thead>';
    h+='<tbody>'+prodRows(fell)+'</tbody></table>';
  } else h+='<div class="comp-empty">Ninguno cayó vs '+PREV_YEAR+'</div>';
  h+='</div></div>';

  if(nodat.length) h+='<div style="padding:8px 14px;font-size:10px;color:#bbb">'+nodat.length+' producto(s) sin ventas en '+PREV_YEAR+' (no incluidos)</div>';
  return h;
}

// ── MODAL RUBRO ────────────────────────────────────────────────────────────────
function openRubroModal(idx,evt){
  if(evt) evt.stopPropagation();
  var r=DATA_RUBROS[idx]; if(!r) return;
  document.getElementById('m-title').textContent=r.rubro;
  document.getElementById('m-sub').textContent=r.sector;
  var st=document.getElementById('m-status');
  st.textContent=r.pct_proy>=90?'✅ PROY: CUMPLE':r.pct_proy>=60?'⚠️ PROY: RIESGO':'🔴 PROY: NO CUMPLE';
  st.className='m-status '+bClass(r.pct_proy);
  var yt=document.getElementById('m-status-ytd');
  yt.textContent=r.pct_ytd>=90?'✅ YTD: OK':r.pct_ytd>=60?'⚠️ YTD: RIESGO':'🔴 YTD: ATRASADO';
  yt.className='m-status m-status-outline '+bClass(r.pct_ytd);

  document.getElementById('m-tabs').style.display='flex';
  document.getElementById('m-body').style.display='none';
  document.getElementById('m-tab-comp').innerHTML    = buildComparativa(r);
  document.getElementById('m-tab-analisis').innerHTML = r.analisis_html||'';
  switchTab('comp');
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

// ── MODAL PRODUCTO ────────────────────────────────────────────────────────────
function openProdModal(idx,evt){
  if(evt) evt.stopPropagation();
  var p=DATA_PROD[idx]; if(!p) return;
  document.getElementById('m-title').textContent=p.desc.length>60?p.desc.substring(0,60)+'…':p.desc;
  document.getElementById('m-sub').textContent='Art. '+p.art+' · '+p.rubro;
  var st=document.getElementById('m-status');
  st.textContent=p.pct_proy>=90?'✅ PROY: CUMPLE':p.pct_proy>=60?'⚠️ PROY: RIESGO':'🔴 PROY: NO CUMPLE';
  st.className='m-status '+bClass(p.pct_proy);
  var yt=document.getElementById('m-status-ytd');
  yt.textContent=p.pct_ytd>=90?'✅ YTD: OK':p.pct_ytd>=60?'⚠️ YTD: RIESGO':'🔴 YTD: ATRASADO';
  yt.className='m-status m-status-outline '+bClass(p.pct_ytd);

  document.getElementById('m-tabs').style.display='none';
  document.getElementById('m-tab-comp').style.display='none';
  document.getElementById('m-tab-analisis').style.display='none';
  document.getElementById('m-body').style.display='flex';

  var ccc=cct(p.pct_cumpl),ccp=cct(p.pct_proy),ccy=cct(p.pct_ytd);
  var bW=Math.min(p.pct_cumpl||0,100),pW=Math.min(p.pct_proy||0,100),yW=Math.min(p.pct_ytd||0,100);
  var bC=bc(p.pct_proy),yC=bc(p.pct_ytd);
  var tot=(p.alameda||0)+(p.grupo_b||0);
  var pA=tot?Math.round(p.alameda/tot*100):0, pG=tot?Math.round(p.grupo_b/tot*100):0;
  var body='';

  // Comparativa MTD producto
  if(p.prev_mtd>0||p.venta_mtd>0){
    var periodo=MES_ABREV+' 1–'+DIA_HOY;
    body+='<div class="m-section" style="background:#f5f7fa">';
    body+='<div class="m-section-title">📊 Comparativa '+periodo+' vs '+PREV_YEAR+'</div>';
    body+='<div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;padding:4px 0">';
    body+='<div style="text-align:center"><div style="font-size:18px;font-weight:800;color:#888">'+fmtU(p.prev_mtd)+'</div><div style="font-size:9px;color:#aaa;font-weight:700;margin-top:2px">'+periodo+' '+PREV_YEAR+'</div></div>';
    body+='<div style="font-size:20px;color:#ccc">→</div>';
    body+='<div style="text-align:center"><div style="font-size:18px;font-weight:800;color:#1F3864">'+fmtU(p.venta_mtd)+'</div><div style="font-size:9px;color:#aaa;font-weight:700;margin-top:2px">'+periodo+' 2026</div></div>';
    body+='<div style="font-size:22px;font-weight:900">'+varBadge(p.var_mtd_yoy)+'</div>';
    body+='</div></div>';
  }

  body+='<div class="m-section"><div class="m-section-title">📅 Cumplimiento Mensual</div>';
  body+='<div class="m-trio">'+mMetric(fmtU(p.venta_u),'Unidades vendidas',ccc)+mMetric(fmtU(p.obj_mes),'Objetivo mensual','')+mMetric(fmtPct(p.pct_cumpl),'% Cumplimiento',ccc)+'</div>';
  body+='<div class="m-bar-wrap"><div class="m-bar-label"><span>Avance actual</span><span class="'+ccc+'">'+fmtU(p.venta_u)+' de '+fmtU(p.obj_mes)+' u.</span></div>';
  body+='<div class="m-bar-track"><div class="m-bar-proj-fill" style="width:'+pW+'%;background:'+bC+'"></div>';
  body+='<div class="m-bar-fill" style="width:'+bW+'%;background:'+bC+'"><span>'+fmtPct(p.pct_cumpl)+'</span></div>';
  if(bW<100) body+='<div class="m-bar-marker" style="left:'+Math.min(pW,99.5)+'%"></div>';
  body+='</div><div class="m-bar-note">Translúcida = proyección al cierre ('+fmtPct(p.pct_proy)+')</div></div></div>';

  body+='<div class="m-section"><div class="m-section-title">🔮 Proyección al Cierre</div>';
  body+='<div class="m-trio">'+mMetric(fmtU(p.proyeccion),'Unidades proyectadas',ccp)+mMetric(fmtPct(p.pct_proy),'% Proyectado',ccp)+mMetric(p.clasif,'Clasificación','')+'</div></div>';

  body+='<div class="m-section"><div class="m-section-title">📈 Acumulado del Año (YTD — Ene a '+MES_ABREV+')</div>';
  body+='<div class="m-trio">'+mMetric(fmtU(p.venta_ytd),'Unidades YTD',ccy)+mMetric(fmtU(p.obj_ytd),'Objetivo YTD','')+mMetric(fmtPct(p.pct_ytd),'% Cumpl. YTD',ccy)+'</div>';
  body+='<div class="m-bar-wrap"><div class="m-bar-label"><span>Progreso anual</span><span class="'+ccy+'">'+fmtU(p.venta_ytd)+' de '+fmtU(p.obj_ytd)+' u.</span></div>';
  body+='<div class="m-bar-track"><div class="m-bar-fill" style="width:'+yW+'%;background:'+yC+'"><span>'+fmtPct(p.pct_ytd)+'</span></div></div></div>';
  if(p.prev_ytd>0) body+='<div style="font-size:11px;color:#888;margin-top:6px">YTD '+PREV_YEAR+': <strong>'+fmtU(p.prev_ytd)+'</strong> u · variación: <strong>'+varBadge(p.var_ytd_yoy)+'</strong></div>';
  body+='</div>';

  body+='<div class="m-section"><div class="m-section-title">📦 Stock & Distribución</div>';
  body+='<div class="m-trio">'+mMetric(fmtU(p.stock),'Stock total','')+mMetric(p.cobertura!=null?p.cobertura.toFixed(1)+' m':'—','Cobertura',p.cobertura!=null&&p.cobertura<1.5?'c-red':'')+mMetric(String(p.art),'Nro. Artículo','')+'</div>';
  body+='<div class="m-dist-row"><div class="m-dist-name">ALAMEDA</div><div class="m-dist-bar"><div class="m-dist-fill" style="width:'+pA+'%">'+(pA>15?'<span>'+pA+'%</span>':'')+'</div></div><div class="m-dist-stat"><b>'+fmtU(p.alameda)+'</b> u · '+pA+'%</div></div>';
  body+='<div class="m-dist-row"><div class="m-dist-name">GRUPO B</div><div class="m-dist-bar"><div class="m-dist-fill" style="width:'+pG+'%;background:#1F3864">'+(pG>15?'<span>'+pG+'%</span>':'')+'</div></div><div class="m-dist-stat"><b>'+fmtU(p.grupo_b)+'</b> u · '+pG+'%</div></div></div>';
  document.getElementById('m-body').innerHTML=body;
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(){
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow='';
}
function overlayClick(e){
  if(e.target===document.getElementById('modal-overlay')) closeModal();
}
document.addEventListener('keydown',function(e){if(e.key==='Escape') closeModal();});

function switchMain(panel, btn) {
  document.querySelectorAll('.main-panel').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.main-tab').forEach(function(b)  { b.classList.remove('active'); });
  document.getElementById('panel-'+panel).classList.add('active');
  if (btn) {
    btn.classList.add('active');
  } else {
    document.querySelectorAll('.main-tab').forEach(function(b) {
      if (b.getAttribute('onclick') && b.getAttribute('onclick').indexOf("'"+panel+"'") >= 0)
        b.classList.add('active');
    });
  }
}

function goToStock(art, evt) {
  if (evt) evt.stopPropagation();
  switchMain('stock', null);
  setTimeout(function() {
    var rows = document.querySelectorAll('#stock-tbody tr');
    rows.forEach(function(tr) {
      if (tr.getAttribute('data-art') == String(art)) {
        tr.scrollIntoView({behavior:'smooth', block:'center'});
        var prev = tr.style.background;
        tr.style.transition = 'background .3s';
        tr.style.background = '#fff3cd';
        tr.style.outline = '2px solid #e67e22';
        setTimeout(function() {
          tr.style.background = prev;
          tr.style.outline = '';
        }, 2500);
      }
    });
  }, 80);
}

function goToCumpl(art, evt) {
  if (evt) evt.stopPropagation();
  switchMain('cumplimiento', null);
  setTimeout(function() {
    var found = false;
    document.querySelectorAll('.ptable tbody tr').forEach(function(tr) {
      var artCell = tr.cells && tr.cells[0];
      if (artCell && artCell.textContent.trim().replace(/[^0-9]/g,'') == String(art)) {
        // Expandir la rubro card padre si está cerrada
        var rcard = tr.closest('.rcard');
        if (rcard && !rcard.classList.contains('open')) {
          rcard.classList.add('open');
        }
        tr.scrollIntoView({behavior:'smooth', block:'center'});
        tr.style.transition = 'background .3s';
        tr.style.background = '#e8f0fc';
        tr.style.outline = '2px solid #2E5FA3';
        setTimeout(function() {
          tr.style.background = '';
          tr.style.outline = '';
        }, 2500);
        found = true;
      }
    });
    if (!found) {
      // El producto no tiene fila individual (sin objetivo): buscar por rubro y expandir
      var prod = DATA_PROD.find(function(p) { return String(p.art) == String(art); });
      if (prod) {
        document.querySelectorAll('.rcard .rname').forEach(function(el) {
          if (el.textContent.trim().toUpperCase() === prod.rubro.toUpperCase()) {
            var rcard = el.closest('.rcard');
            if (rcard) {
              if (!rcard.classList.contains('open')) rcard.classList.add('open');
              rcard.scrollIntoView({behavior:'smooth', block:'start'});
            }
          }
        });
      }
    }
  }, 100);
}

render();
renderFinancKPIs();
</script>
