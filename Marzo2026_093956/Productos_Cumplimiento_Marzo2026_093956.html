:root{
  --red:   #c0392b; --amber: #e67e22; --green: #27ae60;
  --dark:  #1a2a3a; --mid:   #2c3e50; --light: #ecf0f1;
  --bg:    #f4f6f9; --white: #ffffff;
  --purple:#6c3483; --teal:  #0e6655;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:var(--bg);color:#333;}

/* HEADER */
.header{background:var(--dark);color:#fff;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.header h1{font-size:16px;font-weight:700;letter-spacing:.5px;}
.header .sub{font-size:12px;opacity:.7;}

/* KPI BAR */
.kpi-bar{display:flex;gap:12px;padding:14px 16px;background:#fff;border-bottom:1px solid #dde;flex-wrap:wrap;}
.kpi{flex:1;min-width:100px;background:var(--bg);border-radius:8px;padding:10px 14px;text-align:center;}
.kpi .num{font-size:24px;font-weight:700;}
.kpi .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:#666;margin-top:2px;}
.kpi.red  .num{color:var(--red);}
.kpi.amber .num{color:var(--amber);}
.kpi.green .num{color:var(--green);}
.kpi.total .num{color:var(--dark);}

/* FILTROS */
.filters{padding:10px 16px;background:#fff;border-bottom:1px solid #dde;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.filters label{font-size:11px;color:#666;}
.filter-btn{padding:5px 12px;border:1.5px solid #ccc;border-radius:20px;font-size:11px;cursor:pointer;background:#fff;transition:all .15s;}
.filter-btn.active{background:var(--dark);color:#fff;border-color:var(--dark);}
.filter-btn.f-red.active   {background:var(--red);border-color:var(--red);}
.filter-btn.f-amber.active {background:var(--amber);border-color:var(--amber);}
.filter-btn.f-green.active {background:var(--green);border-color:var(--green);}

/* CONTENEDOR RUBROS */
.rubros-wrap{padding:14px 16px;display:flex;flex-direction:column;gap:10px;}

/* CARD RUBRO */
.rubro-card{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.08);overflow:hidden;}
.rubro-header{
  display:flex;align-items:center;gap:10px;padding:12px 16px;
  cursor:pointer;user-select:none;border-left:4px solid #ccc;
  transition:background .1s;
}
.rubro-header:hover{background:#f8f8f8;}
.rubro-header.red   {border-color:var(--red);}
.rubro-header.amber {border-color:var(--amber);}
.rubro-header.green {border-color:var(--green);}
.rubro-name{font-size:13px;font-weight:700;flex:1;}
.rubro-stats{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.rubro-badge{
  font-size:10px;padding:3px 8px;border-radius:12px;font-weight:600;
  white-space:nowrap;
}
.badge-red   {background:#fdecea;color:var(--red);}
.badge-amber {background:#fef3e2;color:#b7660a;}
.badge-green {background:#e8f8f0;color:#1a7a3c;}
.badge-gray  {background:#f0f0f0;color:#666;}
.rubro-count{font-size:11px;color:#888;white-space:nowrap;}
.chevron{font-size:13px;color:#aaa;transition:transform .2s;margin-left:4px;}
.rubro-card.open .chevron{transform:rotate(180deg);}

/* TABLA PRODUCTOS */
.prod-table-wrap{overflow-x:auto;display:none;}
.rubro-card.open .prod-table-wrap{display:block;}
.prod-table{width:100%;border-collapse:collapse;font-size:12px;}
.prod-table thead th{
  background:#f0f2f5;color:#555;font-size:10px;text-transform:uppercase;
  letter-spacing:.4px;padding:7px 10px;text-align:left;white-space:nowrap;
  position:sticky;top:0;
}
.prod-table thead th.r{text-align:right;}
.prod-table tbody tr{border-top:1px solid #eee;transition:background .1s;}
.prod-table tbody tr:hover{background:#f7f9fc;}
.prod-table td{padding:8px 10px;vertical-align:middle;white-space:nowrap;}
.prod-table td.desc{white-space:normal;max-width:260px;font-size:11px;line-height:1.4;}
.prod-table td.r{text-align:right;}

/* BAR EN TABLA */
.mini-bar-wrap{min-width:100px;position:relative;}
.mini-bar-track{height:8px;background:#eee;border-radius:4px;overflow:hidden;position:relative;}
.mini-bar-proj{height:100%;position:absolute;top:0;left:0;opacity:.25;border-radius:4px;}
.mini-bar-fill{height:100%;position:absolute;top:0;left:0;border-radius:4px;transition:width .4s;}
.mini-bar-100{position:absolute;top:-3px;bottom:-3px;width:1px;background:rgba(0,0,0,.15);left:100%;}
.mini-pct{font-size:10px;margin-top:2px;font-weight:600;}

/* BADGES STATUS */
.status-badge{
  font-size:10px;padding:3px 7px;border-radius:10px;white-space:nowrap;font-weight:600;
}
.s-red   {background:#fdecea;color:var(--red);}
.s-amber {background:#fef3e2;color:#b7660a;}
.s-green {background:#e8f8f0;color:#1a7a3c;}
.s-over  {background:#eaf0fb;color:#1a5276;}

/* COBERTURA */
.cob-warn{color:var(--red);font-weight:700;}
.cob-ok  {color:#666;}

/* TEXTOS COLOR */
.c-red  {color:var(--red);font-weight:600;}
.c-amb  {color:var(--amber);font-weight:600;}
.c-grn  {color:var(--green);font-weight:600;}

/* COLLAPSE ALL BTN */
.toolbar{padding:8px 16px;display:flex;gap:8px;align-items:center;}
.tool-btn{padding:4px 12px;border:1px solid #ccc;border-radius:6px;font-size:11px;cursor:pointer;background:#fff;}
.tool-btn:hover{background:#f0f0f0;}

/* RESPONSIVE */
@media(max-width:600px){
  .kpi{min-width:calc(50% - 6px);}
  .prod-table thead{display:none;}
  .prod-table td{display:block;padding:3px 10px;}
  .prod-table td::before{content:attr(data-label)": ";font-weight:600;color:#555;font-size:10px;}
  .prod-table tbody tr{padding:8px 0;display:block;}
  .prod-table td.desc{font-size:12px;}
}
</style>
</head>

// Agrupar por rubro respetando el orden del servidor (peor primero)
var RUBRO_ORDER = ["AMASADORAS RAPIDAS", "HORNOS PIZZEROS", "FREEZER", "FREIDORA AUTOMATICA", "HELADERABAJOMESADA", "COCINAS", "HELVITRINA", "HORNOS CONVECTORES", "FREIDORAS", "VERTICALES", "BATEACARNICERA", "FREIDORAS ELECTRICAS", "VERTICAL CONGELADOS", "COCINA GASTRONOMICA"];

function fmtPct(v){
  if(v===null||v===undefined) return '—';
  return v.toFixed(1)+'%';
}
function fmtU(v){
  if(v===null||v===undefined||v==='—') return '—';
  return Number(v).toLocaleString('es-AR');
}
function colorClass(pct){
  if(pct===null||pct===undefined) return '';
  if(pct>=90) return 'c-grn';
  if(pct>=60) return 'c-amb';
  return 'c-red';
}
function barColor(pct){
  if(pct===null||pct===undefined) return '#aaa';
  if(pct>=90) return '#27ae60';
  if(pct>=60) return '#e67e22';
  return '#c0392b';
}
function rubroColorClass(avgPct){
  if(avgPct>=90) return 'green';
  if(avgPct>=60) return 'amber';
  return 'red';
}
function statusBadge(pct, label){
  if(pct===null||pct===undefined) return '<span class="status-badge badge-gray">—</span>';
  if(pct>=120) return '<span class="status-badge s-over">📈 '+label+'</span>';
  if(pct>=90)  return '<span class="status-badge s-green">✅ '+label+'</span>';
  if(pct>=60)  return '<span class="status-badge s-amber">⚠️ '+label+'</span>';
  return              '<span class="status-badge s-red">🔴 '+label+'</span>';
}
function proyStatusBadge(pct){
  return statusBadge(pct, 'Proyección');
}

var currentFilter = 'all';

function prodMatchFilter(prod){
  if(currentFilter==='all') return true;
  var p = prod.pct_proy;
  if(currentFilter==='red')   return p!==null && p<60;
  if(currentFilter==='amber') return p!==null && p>=60 && p<90;
  if(currentFilter==='green') return p!==null && p>=90;
  return true;
}

function renderAll(){
  var wrap = document.getElementById('rubros-wrap');
  var html = '';

  for(var ri=0;ri<RUBRO_ORDER.length;ri++){
    var rubro = RUBRO_ORDER[ri];
    var prods = DATA.filter(function(p){return p.rubro===rubro && prodMatchFilter(p);});
    if(prods.length===0) continue;

    // Métricas del rubro
    var vals  = prods.map(function(p){return p.pct_proy;}).filter(function(v){return v!==null;});
    var avg   = vals.length ? vals.reduce(function(a,b){return a+b;},0)/vals.length : null;
    var cc    = rubroColorClass(avg);
    var n_nc  = prods.filter(function(p){return p.pct_proy!==null && p.pct_proy<60;}).length;
    var n_rsk = prods.filter(function(p){return p.pct_proy!==null && p.pct_proy>=60 && p.pct_proy<90;}).length;
    var n_ok  = prods.filter(function(p){return p.pct_proy!==null && p.pct_proy>=90;}).length;
    var totalU= prods.reduce(function(a,p){return a+(p.venta_u||0);},0);
    var totalO= prods.reduce(function(a,p){return a+(p.obj_mes||0);},0);

    html += '<div class="rubro-card open" id="rc-'+ri+'">';

    // Header del rubro
    html += '<div class="rubro-header '+cc+'" onclick="toggleCard('rc-'+ri+'')">';
    html +=   '<span class="rubro-name">'+rubro+'</span>';
    html +=   '<span class="rubro-stats">';
    html +=     '<span class="rubro-count">'+totalU+' / '+totalO.toFixed(0)+' u</span>';
    if(n_nc>0)  html += '<span class="rubro-badge badge-red">'+n_nc+' sin cumplir</span>';
    if(n_rsk>0) html += '<span class="rubro-badge badge-amber">'+n_rsk+' en riesgo</span>';
    if(n_ok>0)  html += '<span class="rubro-badge badge-green">'+n_ok+' ok</span>';
    html +=   '</span>';
    html +=   '<span class="chevron">▼</span>';
    html += '</div>';

    // Tabla de productos
    html += '<div class="prod-table-wrap">';
    html += '<table class="prod-table">';
    html += '<thead><tr>';
    html += '<th>Art.</th>';
    html += '<th>Descripción</th>';
    html += '<th class="r">Venta</th>';
    html += '<th class="r">Objetivo</th>';
    html += '<th>Cumpl. actual</th>';
    html += '<th>Proyección</th>';
    html += '<th class="r">Stock</th>';
    html += '<th class="r">Cob. (m)</th>';
    html += '</tr></thead>';
    html += '<tbody>';

    // Ordenar productos: peor proyección primero
    prods.sort(function(a,b){
      var pa = a.pct_proy!==null?a.pct_proy:999;
      var pb = b.pct_proy!==null?b.pct_proy:999;
      return pa-pb;
    });

    for(var pi=0;pi<prods.length;pi++){
      var p    = prods[pi];
      var bc   = barColor(p.pct_proy);
      var barW = Math.min(p.pct_cumpl||0, 100);
      var prjW = Math.min(p.pct_proy||0, 100);
      var ccPc = colorClass(p.pct_cumpl);
      var ccPp = colorClass(p.pct_proy);
      var cobCls = (p.cobertura!==null && p.cobertura<1.5) ? 'cob-warn' : 'cob-ok';
      var cobTxt = p.cobertura!==null ? p.cobertura.toFixed(1) : '—';
      if(p.cobertura!==null && p.cobertura<1.5) cobTxt += ' ⚠️';

      html += '<tr>';
      html += '<td data-label="Art">'+p.art+'</td>';
      html += '<td class="desc" data-label="Descripción">'+p.desc+'</td>';
      html += '<td class="r" data-label="Venta"><span class="'+ccPc+'">'+fmtU(p.venta_u)+'</span></td>';
      html += '<td class="r" data-label="Obj">'+fmtU(p.obj_mes)+'</td>';

      // Barra mini
      html += '<td data-label="Cumpl.">';
      html +=   '<div class="mini-bar-wrap">';
      html +=     '<div class="mini-bar-track">';
      html +=       '<div class="mini-bar-proj" style="width:'+prjW+'%;background:'+bc+'"></div>';
      html +=       '<div class="mini-bar-fill" style="width:'+barW+'%;background:'+bc+'"></div>';
      if(barW<100) html += '<div class="mini-bar-100"></div>';
      html +=     '</div>';
      html +=     '<div class="mini-pct '+ccPc+'">'+fmtPct(p.pct_cumpl)+'</div>';
      html +=   '</div>';
      html += '</td>';

      // Proyección
      html += '<td data-label="Proyección">'+proyStatusBadge(p.pct_proy)+'<br>';
      html +=   '<span style="font-size:10px;color:#888;">'+fmtU(p.proyeccion)+' u proy.</span></td>';

      html += '<td class="r" data-label="Stock">'+fmtU(p.stock)+'</td>';
      html += '<td class="r" data-label="Cobertura"><span class="'+cobCls+'">'+cobTxt+'</span></td>';
      html += '</tr>';
    }

    html += '</tbody></table>';
    html += '</div>'; // prod-table-wrap
    html += '</div>'; // rubro-card
  }

  wrap.innerHTML = html;
}

function setFilter(f, btn){
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  renderAll();
}

function toggleCard(id){
  var card = document.getElementById(id);
  if(card) card.classList.toggle('open');
}

function toggleAll(open){
  document.querySelectorAll('.rubro-card').forEach(function(c){
    if(open) c.classList.add('open');
    else c.classList.remove('open');
  });
}

renderAll();
</script>
</body>
</html>
